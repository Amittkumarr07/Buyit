<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyit - Shopping Cart</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/2a9a534f60.js" crossorigin="anonymous"></script>
</head>

<body>

    <nav class="navbar">
        <a href="/" class="logo-link">
            <div class="logo">Buy<span>it</span></div>
        </a>

        <form class="search-container" id="search-form">
            <input type="search" id="search-input" placeholder="Search products..." required>
            <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
        </form>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>

            <li id="nav-login-btn"><a href="login.html" class="login-btn">Login</a></li>

            <li id="nav-user-profile" style="display: none;">
                <a href="account.html" id="nav-username" style="color: var(--primary-color); font-weight: bold;">User</a>
            </li>

            <li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a></li>
        </ul>
    </nav>

    <section class="cart-section">
        <h2>Your Shopping Cart</h2>
        <div class="cart-container">

            <div class="cart-items" id="cart-items-container">
                <!--this will render by script.js-->
            </div>

            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">₹0.00</span>
                </div>
                <div class="summary-row">
                    <span>Delivery</span>
                    <span style="color: var(--primary-color);">FREE</span>
                </div>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #ddd;">
                <div class="summary-row total-row">
                    <span>Total Amount</span>
                    <span id="cart-total">₹0.00</span>
                </div>
                <!-- checkout-btn class is picked up by script.js to redirect to checkout.html -->
                <button class="btn checkout-btn" style="margin-top: 20px;">
                    Proceed to Checkout <i class="fa-solid fa-arrow-right" style="margin-left:6px;"></i>
                </button>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 Buyit. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
    <script type="module" src="js/auth.js"></script>

</body>
</html>
