<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyit - Checkout</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/2a9a534f60.js" crossorigin="anonymous"></script>
    <!--Emailjs SDK-->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo-link">
            <div class="logo">Buy<span>it</span></div>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>
            <li id="nav-login-btn"><a href="login.html" class="login-btn">Login</a></li>
            <li id="nav-user-profile" style="display: none;">
                <a href="account.html" id="nav-username" style="color: var(--primary-color); font-weight: bold;">User</a>
            </li>
            <li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a></li>
        </ul>
    </nav>

    <section class="checkout-section">
        <h2>Checkout</h2>

        <div class="checkout-steps">
            <div class="step active" id="step-indicator-1"><span>1</span> Delivery Address</div>
            <div class="step-divider"></div>
            <div class="step" id="step-indicator-2"><span>2</span> Payment</div>
            <div class="step-divider"></div>
            <div class="step" id="step-indicator-3"><span>3</span> Review & Place Order</div>
        </div>

        <div class="checkout-layout">

            <div class="checkout-form-area">

                <div class="checkout-step-panel" id="step-1">
                    <h3>Delivery Address</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="full-name" placeholder="Enter your full name" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number *</label>
                            <input type="tel" id="phone" placeholder="10-digit mobile number" required>
                        </div>
                        <div class="form-group full-width">
                            <label>Street Address *</label>
                            <input type="text" id="address" placeholder="House No., Street, Area" required>
                        </div>
                        <div class="form-group">
                            <label>City *</label>
                            <input type="text" id="city" placeholder="City" required>
                        </div>
                        <div class="form-group">
                            <label>State *</label>
                            <select id="state">
                                <option value="">Select State</option>
                                <option>Andhra Pradesh</option><option>Arunachal Pradesh</option>
                                <option>Assam</option><option>Bihar</option><option>Chhattisgarh</option>
                                <option>Goa</option><option>Gujarat</option><option>Haryana</option>
                                <option>Himachal Pradesh</option><option>Jharkhand</option>
                                <option>Karnataka</option><option>Kerala</option>
                                <option>Madhya Pradesh</option><option>Maharashtra</option>
                                <option>Manipur</option><option>Meghalaya</option><option>Mizoram</option>
                                <option>Nagaland</option><option>Odisha</option><option>Punjab</option>
                                <option>Rajasthan</option><option>Sikkim</option>
                                <option>Tamil Nadu</option><option>Telangana</option><option>Tripura</option>
                                <option>Uttar Pradesh</option><option>Uttarakhand</option>
                                <option>West Bengal</option><option>Delhi</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>PIN Code *</label>
                            <input type="text" id="pincode" placeholder="6-digit PIN" maxlength="6" required>
                        </div>
                    </div>
                    <button class="btn step-btn" onclick="goToStep(2)">Continue to Payment</button>
                </div>

                <!-- Step 2: Payment -->
                <div class="checkout-step-panel hidden" id="step-2">
                    <h3>Payment Method</h3>
                    <div class="payment-options">
                        <label class="payment-option">
                            <input type="radio" name="payment" value="cod" checked>
                            <div class="payment-option-content">
                                <i class="fa-solid fa-money-bill-wave"></i>
                                <div>
                                    <strong>Cash on Delivery</strong>
                                    <p>Pay when your order arrives</p>
                                </div>
                            </div>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="upi">
                            <div class="payment-option-content">
                                <i class="fa-solid fa-mobile-screen"></i>
                                <div>
                                    <strong>UPI</strong>
                                    <p>Pay via UPI ID or QR code</p>
                                </div>
                            </div>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="card">
                            <div class="payment-option-content">
                                <i class="fa-solid fa-credit-card"></i>
                                <div>
                                    <strong>Credit / Debit Card</strong>
                                    <p>All major cards accepted</p>
                                </div>
                            </div>
                        </label>
                    </div>
                    
                    <div class="payment-fields hidden" id="upi-fields">
                        <div class="form-group">
                            <label>UPI ID</label>
                            <input type="text" id="upi-id" placeholder="yourname@upi">
                        </div>
                    </div>

                    <div class="payment-fields hidden" id="card-fields">
                        <div class="form-group full-width">
                            <label>Card Number</label>
                            <input type="text" id="card-number" placeholder="1234 5678 9012 3456" maxlength="19">
                        </div>
                        <div class="form-grid" style="margin-top:0;">
                            <div class="form-group">
                                <label>Expiry Date</label>
                                <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5">
                            </div>
                            <div class="form-group">
                                <label>CVV</label>
                                <input type="password" id="card-cvv" placeholder="•••" maxlength="3">
                            </div>
                        </div>
                    </div>

                    <div class="step-btn-row">
                        <button class="btn outline-btn" onclick="goToStep(1)">Back</button>
                        <button class="btn step-btn" onclick="goToStep(3)">Review Order</button>
                    </div>
                </div>

                <div class="checkout-step-panel hidden" id="step-3">
                    <h3>Review Your Order</h3>
                    <div class="review-section">
                        <h4>Delivering to:</h4>
                        <div id="review-address" class="review-box"></div>
                    </div>
                    <div class="review-section">
                        <h4>Payment Method:</h4>
                        <div id="review-payment" class="review-box"></div>
                    </div>
                    <div class="review-section">
                        <h4>Items:</h4>
                        <div id="review-items" class="review-box"></div>
                    </div>

                    <p id="place-order-error" style="color:red; margin-top:10px; display:none;"></p>

                    <div class="step-btn-row">
                        <button class="btn outline-btn" onclick="goToStep(2)">Back</button>
                        <button class="btn step-btn place-order-btn" id="place-order-btn" onclick="placeOrder()">
                            <i class="fa-solid fa-bag-shopping"></i> Place Order
                        </button>
                    </div>
                </div>

            </div>

            <div class="checkout-summary">
                <h3>Order Summary</h3>
                <div id="checkout-items-list"></div>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #ddd;">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="checkout-subtotal">₹0</span>
                </div>
                <div class="summary-row">
                    <span>Delivery</span>
                    <span style="color: var(--primary-color);">FREE</span>
                </div>
                <div class="summary-row total-row" style="margin-top:10px; font-size:1.1rem;">
                    <span>Total</span>
                    <span id="checkout-total">₹0</span>
                </div>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 Buyit. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/checkout.js"></script>
</body>
</html>
